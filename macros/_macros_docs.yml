macros:
  - name: cent_to_dollars
    description: A macro that converts dollars to cents.
    arguments:
      - name: column_name
        type: string
        description: The name of the column you want to convert
      - name: decimals
        type: integer
        description: Number of decimal places, default to 2
  - name: grant_select
    description: a macro that grants select privs
    arguments:
      - name: schema
        type: string
        description: schema 
      - name: role
        type: string
        description: role